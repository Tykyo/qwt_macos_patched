name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        qt-version: ['6.10.3', '6.11.1', '6.12.0']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Qt ${{ matrix.qt-version }}
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt-version }}
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true

      - name: Patch qyieldcpu.h (bug __yield on recent Xcode)
        run: |
          QT_HEADER=$(find "$RUNNER_WORKSPACE/Qt/${{ matrix.qt-version }}" -name qyieldcpu.h -path "*/Versions/A/Headers/*")
          if [ -n "$QT_HEADER" ] && grep -q '#if __has_builtin(__yield)' "$QT_HEADER"; then
            perl -i -pe 's/#if __has_builtin\(__yield\)/#if __has_builtin(__builtin_arm_yield)\n    __builtin_arm_yield();\n#elif __has_builtin(__yield)/' "$QT_HEADER"
            echo "Patched: $QT_HEADER"
          else
            echo "No patch required (file not found or already fixed)"
          fi

      - name: Build with qmake
        run: |
          mkdir build
          cd build
          qmake ../qwt_macos_patched.pro
          make -j$(sysctl -n hw.ncpu)

      - name: Create framework zip
        run: |
          cd build/qwt/lib
          zip -r -y qwt-macos-qt${{ matrix.qt-version }}.zip *.framework

      - name: Upload as artefact
        uses: actions/upload-artifact@v7
        with:
          name: qwt-macos-qt${{ matrix.qt-version }}
          path: build/qwt/lib/*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artefacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
