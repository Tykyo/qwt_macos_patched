stages:
  - build
  - release

workflow:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags:
    - macos

variables:
  GIT_SUBMODULE_STRATEGY: recursive
  QT_INSTALL_ROOT: "$CI_PROJECT_DIR/.qt"

build:
  stage: build
  parallel:
    matrix:
      - QT_VERSION: ["6.10.3", "6.11.1", "6.12.0"]
  script:
    # aqtinstall is the GitLab CI equivalent of the install-qt-action used by
    # the former GitHub workflow. The macOS Runner must provide Python 3,
    # Xcode Command Line Tools, qmake's build prerequisites, and zip.
    - python3 -m pip install --user aqtinstall
    - python3 -m aqt install-qt mac desktop "$QT_VERSION" clang_64 --outputdir "$QT_INSTALL_ROOT"
    - export QT_ROOT="$QT_INSTALL_ROOT/$QT_VERSION/macos"
    - export PATH="$QT_ROOT/bin:$PATH"
    - |
      QT_HEADER=$(find "$QT_ROOT" -name qyieldcpu.h -path "*/Versions/A/Headers/*" -print -quit)
      if [ -n "$QT_HEADER" ] && grep -q '#if __has_builtin(__yield)' "$QT_HEADER"; then
        perl -i -pe 's/#if __has_builtin\(__yield\)/#if __has_builtin(__builtin_arm_yield)\n    __builtin_arm_yield();\n#elif __has_builtin(__yield)/' "$QT_HEADER"
        echo "Patched: $QT_HEADER"
      else
        echo "No patch required (file not found or already fixed)"
      fi
    - mkdir build
    - cd build
    - qmake ../qwt_macos_patched.pro
    - make -j"$(sysctl -n hw.ncpu)"
    - cd qwt/lib
    - zip -r -y "qwt-macos-qt${QT_VERSION}.zip" *.framework
  artifacts:
    name: "qwt-macos-qt${QT_VERSION}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - build/qwt/lib/*.zip
    expire_in: 30 days

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  tags:
    - docker
  needs:
    - job: build
      artifacts: true
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  script:
    - echo "Creating release ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Release $CI_COMMIT_TAG"
    description: "Builds macOS Qwt generated by GitLab CI. The framework ZIP files are available as pipeline artifacts."
